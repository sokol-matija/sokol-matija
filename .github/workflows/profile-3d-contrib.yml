name: 3D Contribution Graph

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Generate 3D Contribution Graph
    steps:
      - uses: actions/checkout@v4

      - uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: sokol-matija
          SETTING_JSON: |
            {
              "githubUserName": "sokol-matija",
              "backgroundColor": "#00000000",
              "type": "GitHubNorthStar",
              "foregroundColor": "#ffffff",
              "seasonColors": [
                { "id": "NightRainbow", "saturation": 0.9, "brightness": 1.0 }
              ],
              "fileName": "profile-night-rainbow.svg"
            }

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update 3D contribution graph"
          branch: main
